  shift_png: paper/figures/wmt_mqm_ref_free_audit_zh_en_gpt41mini_shifts.png

dataset:
  language_pairs: ["zh-en"]

evaluation:
  reference_mode: reference_free
  dimension: translation_quality_ref_free
