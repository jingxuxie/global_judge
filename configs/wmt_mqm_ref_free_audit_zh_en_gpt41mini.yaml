protocols:
  - P0_direct_english
  - P2_explicit_pivot

judge:
  model: gpt-4.1-mini
  max_output_tokens: 120
  temperature: 0
  request_limit: 60

calibration:
  fraction: 0.3
  baseline_threshold: 4
  threshold_candidates: [2, 3, 4, 5]
