name: wmt_mqm_ref_free_audit_zh_en_gpt41mini
seed: 83

paths:
  hf_cache_dir: data/raw/hf_datasets
  items_jsonl: data/processed/wmt_mqm_n30_items.jsonl
  english_translations_jsonl: data/processed/wmt_mqm_n30_english_translations.jsonl
  prompts_jsonl: data/prompts/wmt_mqm_ref_free_audit_zh_en_gpt41mini_prompts.jsonl
  responses_jsonl: data/responses/wmt_mqm_ref_free_audit_zh_en_gpt41mini_responses.jsonl
  metrics_csv: data/analysis/wmt_mqm_ref_free_audit_zh_en_gpt41mini_metrics.csv
  shifts_csv: data/analysis/wmt_mqm_ref_free_audit_zh_en_gpt41mini_protocol_shifts.csv
  calibration_csv: data/analysis/wmt_mqm_ref_free_audit_zh_en_gpt41mini_calibration.csv
  calibration_summary_md: data/analysis/wmt_mqm_ref_free_audit_zh_en_gpt41mini_calibration_summary.md
  summary_md: data/analysis/wmt_mqm_ref_free_audit_zh_en_gpt41mini_summary.md
